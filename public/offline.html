<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интернет салсан байна - Түрээс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #16a085, #2ecc71);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .offline-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        .offline-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #16a085, #2ecc71, #16a085);
            background-size: 200% 100%;
            animation: gradientShift 3s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: #f8f9fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .offline-icon svg {
            width: 40px;
            height: 40px;
            color: #95a5a6;
        }

        .offline-title {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .offline-message {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 25px;
            color: #856404;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f39c12;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .retry-button {
            background: linear-gradient(135deg, #16a085, #2ecc71);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 1rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(22, 160, 133, 0.3);
        }

        .home-button {
            background: transparent;
            color: #16a085;
            border: 2px solid #16a085;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .home-button:hover {
            background: #16a085;
            color: white;
            transform: translateY(-2px);
        }

        .features {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #ecf0f1;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            text-align: left;
        }

        .feature-icon {
            width: 24px;
            height: 24px;
            color: #16a085;
        }

        .feature-text {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .online-indicator {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .online-indicator .status-dot {
            background: #28a745;
            animation: none;
        }

        @media (max-width: 768px) {
            .offline-container {
                padding: 2rem;
                margin: 1rem;
            }

            .offline-title {
                font-size: 1.5rem;
            }

            .retry-button,
            .home-button {
                display: block;
                width: 100%;
                margin: 0.5rem 0;
            }
        }

        .dark-mode {
            background: linear-gradient(135deg, #2c3e50, #34495e);
        }

        .dark-mode .offline-container {
            background: #2c3e50;
            color: #ecf0f1;
        }

        .dark-mode .offline-title {
            color: #ecf0f1;
        }

        .dark-mode .offline-message {
            color: #bdc3c7;
        }

        .dark-mode .features {
            border-top-color: #34495e;
        }

        .dark-mode .feature-text {
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M13.477 14.89A6 6 0 015.11 6.524l8.367 8.368zm1.414-1.414L6.524 5.11a6 6 0 018.367 8.367zM4 10a6 6 0 1112 0A6 6 0 014 10z" clip-rule="evenodd"></path>
            </svg>
        </div>

        <h1 class="offline-title">Холболт салсан байна</h1>
        <p class="offline-message">
            Та өмнө нь хийж байсан ажилаа үргэлжлүүлж хийж болно.
        </p>

        <div class="status-indicator" id="connectionStatus">
            <div class="status-dot"></div>
            <span>Холболт салсан байна</span>
        </div>

        <div class="status-indicator online-indicator" id="onlineStatus" style="display: none;">
            <div class="status-dot"></div>
            <span>Сүлжээнд холбогдлоо!</span>
        </div>

        <button class="retry-button" onclick="retryConnection()">
            Дахин ачааллах
        </button>
    

        <div class="features">
            <div class="feature-item">
                <svg class="feature-icon" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path>
                </svg>
                <span class="feature-text">Дахин нэвтрэх боломжтой</span>
            </div>
            
            <div class="feature-item">
                <svg class="feature-icon" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="feature-text">Өмнө нь орсон хуудсууд бүгд ажиллана</span>
            </div>
            
            <div class="feature-item">
                <svg class="feature-icon" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"></path>
                </svg>
                <span class="feature-text">Сүлжээ орох үед таны ажил үргэлжлэх болно</span>
            </div>
        </div>
    </div>

    <script>
        // Check for online status
        function checkOnlineStatus() {
            const offlineStatus = document.getElementById('connectionStatus');
            const onlineStatus = document.getElementById('onlineStatus');
            
            if (navigator.onLine) {
                offlineStatus.style.display = 'none';
                onlineStatus.style.display = 'inline-flex';
                // Auto-redirect after 2 seconds when back online
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                offlineStatus.style.display = 'inline-flex';
                onlineStatus.style.display = 'none';
            }
        }

        // Retry connection
        function retryConnection() {
            checkOnlineStatus();
            if (navigator.onLine) {
                window.location.reload();
            }
        }

        // Listen for online/offline events
        window.addEventListener('online', checkOnlineStatus);
        window.addEventListener('offline', checkOnlineStatus);

        // Initial check
        checkOnlineStatus();

        // Apply dark mode if stored in localStorage
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
        }

        // Animate features on load
        const features = document.querySelectorAll('.feature-item');
        features.forEach((feature, index) => {
            feature.style.opacity = '0';
            feature.style.transform = 'translateY(20px)';
            setTimeout(() => {
                feature.style.transition = 'all 0.5s ease';
                feature.style.opacity = '1';
                feature.style.transform = 'translateY(0)';
            }, 300 + (index * 100));
        });
    </script>
</body>
</html>
